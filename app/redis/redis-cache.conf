# ==============================================================================
# Redis 生产环境配置（Docker 版）
# 场景：网络访问 + 密码认证 + RDB/AOF 双持久化 + 1G 内存限制
# Redis 版本：7.x
# ==============================================================================

################################## NETWORK #####################################

# Docker 容器内监听所有接口，通过宿主机端口映射对外暴露
bind 127.0.0.1 -::1

# 关闭保护模式（已配置密码）
protected-mode no

# 监听端口（与 docker-compose ports 中容器侧端口保持一致）
port 6379

# TCP 连接队列
# 注意：此值受宿主机 net.core.somaxconn 限制，Docker 容器共享宿主机内核
# 宿主机需执行：sysctl -w net.core.somaxconn=1024
tcp-backlog 1024

# 客户端空闲超时（秒），300s 后断开僵尸连接
timeout 300

# TCP Keepalive，检测死连接
tcp-keepalive 60

################################# GENERAL #####################################

# Docker 容器必须设为 no（容器前台运行，daemonize 会导致容器立即退出）
daemonize no

# Docker 环境不使用 systemd，必须设为 no
supervised no

# Docker 容器无需 pidfile（进程由容器运行时管理）
# pidfile 注释掉

# 日志级别
loglevel notice

# Docker 环境日志输出到 stdout，由 Docker 日志驱动统一收集（如 json-file / loki）
# 设为空字符串 = 输出到标准输出，可通过 docker logs 查看
logfile ""

# 数据库数量（默认 16，生产建议按需缩减，减少误操作风险）
databases 16

# 不显示 Logo（减少日志噪音）
always-show-logo no

################################ SNAPSHOTTING  ################################

# RDB 快照策略
# 1小时内有 1 次写操作 / 5分钟内有 100 次 / 1分钟内有 10000 次
save 3600 1 300 100 60 10000

# RDB 保存失败时停止写入（让运维及时发现问题）
stop-writes-on-bgsave-error yes

# RDB 文件压缩
rdbcompression yes

# RDB 文件校验（防止文件损坏加载时静默出错，性能损耗约 10%，生产建议开启）
rdbchecksum yes

# RDB 文件名
dbfilename dump.rdb

# 数据目录（对应 docker-compose volumes 中容器内挂载路径）
dir /data

############################## APPEND ONLY MODE ###############################

# 开启 AOF（配合 RDB 双保险）
appendonly yes

# AOF 文件名
appendfilename "appendonly.aof"

# AOF 文件目录
appenddirname "appendonlydir"

# AOF fsync 策略：
#   always   - 每次写都 fsync，最安全但最慢
#   everysec - 每秒 fsync，最多丢 1 秒数据（推荐）
#   no       - 由 OS 决定，性能最好但可能丢较多数据
appendfsync everysec

# BGSAVE / BGREWRITEAOF 期间暂停 fsync
# 高写入量时设为 yes 防止 fsync 阻塞主线程（最多丢 30s 数据，可接受）
no-appendfsync-on-rewrite yes

# AOF 自动重写：当 AOF 文件比上次重写后增长 100% 时触发
auto-aof-rewrite-percentage 100

# AOF 自动重写最小触发文件大小（太小的文件不值得重写）
auto-aof-rewrite-min-size 128mb

# AOF 截断恢复（启动时遇到不完整 AOF 文件自动恢复，而不是拒绝启动）
aof-load-truncated yes

# AOF 文件使用 RDB 格式作为基础（更快的重写和加载）
aof-use-rdb-preamble yes

# 增量 fsync，每生成 4MB 数据触发一次，防止大文件重写时产生延迟毛刺
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes

################################## SECURITY ###################################

# 访问密码（必须修改为强密码，建议 32 位以上随机字符串）
# 生成强密码命令：openssl rand -base64 32
requirepass btD8fKkQqkTYDirUF7FS08sXp1BHpPgd

# 使用 ACL 精细化权限控制（Redis 6+，推荐替代 requirepass）
# 示例：创建只读用户
# user readonly on >readonly_password ~* &* +@read +ping +info
# aclfile /etc/redis/users.acl

# 禁用或重命名高危命令（防止误操作或攻击）
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command DEBUG    ""
rename-command CONFIG   "I3e4mbyUT3PNfh8hRF0qrrsi4y8VIPfu"
rename-command SHUTDOWN "pJtMBldx8X1KkRX5ubMTjhJ6wq8WFmws"

# ACL 日志（记录认证失败和权限拒绝事件）
acllog-max-len 256

################################### CLIENTS ####################################

# 最大客户端连接数（配合系统 ulimit -n 设置）
maxclients 10000

############################## MEMORY MANAGEMENT ###############################

# 内存上限 1GB
maxmemory 1gb

# 内存淘汰策略：
# noeviction    - 不淘汰，写满返回错误（数据库场景）
# allkeys-lru   - 淘汰最近最少使用的 key（纯缓存场景）
# volatile-lru  - 只淘汰有过期时间的 key（混合场景）
# allkeys-lfu   - 淘汰访问频率最低的 key（热点缓存场景）
# 当前场景：需要持久化防止数据丢失，使用 noeviction
maxmemory-policy allkeys-lru

# LRU/LFU 采样精度（越大越准确，但消耗更多 CPU）
maxmemory-samples 10

# 内存碎片整理（需要 jemalloc，监控 mem_fragmentation_ratio > 1.5 时启用）
# activedefrag no   # 默认关闭，碎片率高时通过 CONFIG SET 动态开启

############################# LAZY FREEING ####################################

# 大 Key 删除/过期/eviction 使用异步非阻塞方式，防止主线程卡顿
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes

################################ THREADED I/O #################################

# I/O 多线程（4核以上机器建议开启，设置为 CPU 核数 - 1，最大不超过 8）
# 1G 内存的小实例，如果 CPU 核数 >= 4 可以开启
# io-threads 4
# io-threads-do-reads no

################################# REPLICATION #################################

# 从库配置（如果有从库，取消以下注释）
# replicaof <masterip> <masterport>
# masterauth <master-password>

# 从库与主库断开期间继续响应读请求（数据可能陈旧，按需设置）
replica-serve-stale-data yes

# 从库只读
replica-read-only yes

# 全量同步使用 diskless 模式（网络带宽好、磁盘慢的环境推荐）
repl-diskless-sync yes
repl-diskless-sync-delay 5

# Replication Backlog（防止短暂断线触发全量同步）
repl-backlog-size 64mb
repl-backlog-ttl 7200

# 至少有 1 个从库且延迟 <= 10s 才接受写入（有从库时启用，防止脑裂）
# min-replicas-to-write 1
# min-replicas-max-lag 10

# 从库优先级（Sentinel 选主用）
replica-priority 100

################################## SLOW LOG ###################################

# 慢查询阈值：超过 1ms（1000 微秒）记录
slowlog-log-slower-than 1000

# 慢查询日志最大条数
slowlog-max-len 1000

################################ LATENCY MONITOR ##############################

# 延迟监控阈值（毫秒），超过此值的操作会被记录
latency-monitor-threshold 100

################################## ADVANCED CONFIG ############################

# 后台任务执行频率（10~100，低延迟场景可调到 100）
hz 15

# 连接数多时动态调高 hz
dynamic-hz yes

# 主动 rehash（建议开启，及时释放内存）
activerehashing yes

# 客户端输出缓冲区限制
client-output-buffer-limit normal  0     0     0
client-output-buffer-limit replica 256mb 64mb  60
client-output-buffer-limit pubsub  32mb  8mb   60

# 禁用透明大页（防止 fork 时 CoW 导致延迟毛刺）
disable-thp yes

# OOM 优先级：后台子进程优先被 OOM Killer 杀死，保护主进程
oom-score-adj yes
oom-score-adj-values 0 200 800

# jemalloc 后台线程（定期归还内存给 OS）
jemalloc-bg-thread yes

############################### DOCKER 环境说明 ################################
# 容器与宿主机共享内核，内核参数必须在【宿主机】上设置，容器内设置无效
#
# 宿主机执行（一次性）：
#   sysctl -w net.core.somaxconn=1024
#   sysctl -w vm.overcommit_memory=1
#   echo never > /sys/kernel/mm/transparent_hugepage/enabled
#
# 永久生效，写入宿主机 /etc/sysctl.conf：
#   net.core.somaxconn = 1024
#   vm.overcommit_memory = 1

############################### DOCKER 部署说明 ################################
#
# 【数据持久化】
# 宿主机目录挂载到容器 /data，RDB 和 AOF 文件都写入此目录：
#   volumes:
#     - /opt/redis/data:/data
#
# 【配置文件挂载】
#   volumes:
#     - /opt/redis/redis.conf:/etc/redis/redis.conf
#
# 【启动命令】
#   command: redis-server /etc/redis/redis.conf
#
# 【内存限制】
# Docker 层面也要设置内存限制，与 maxmemory 保持一致或略大（留给 Redis 内部开销）：
#   deploy:
#     resources:
#       limits:
#         memory: 1200m   # 比 maxmemory 1g 多 200m，留给 AOF 缓冲等内部开销
#
# 【宿主机内核参数】（容器共享宿主机内核，必须在宿主机执行）
#   sysctl -w net.core.somaxconn=1024
#   sysctl -w vm.overcommit_memory=1
#   echo never > /sys/kernel/mm/transparent_hugepage/enabled
#
# 永久生效写入 /etc/sysctl.conf：
#   net.core.somaxconn = 1024
#   vm.overcommit_memory = 1
#
# 【参考 docker-compose.yml】
#
# services:
#   redis:
#     image: redis:7-alpine
#     container_name: redis
#     restart: unless-stopped
#     ports:
#       - "127.0.0.1:6379:6379"   # 只绑定宿主机本地，不对外暴露
#     volumes:
#       - /opt/redis/data:/data
#       - /opt/redis/redis.conf:/etc/redis/redis.conf:ro
#     command: redis-server /etc/redis/redis.conf
#     sysctls:
#       - net.core.somaxconn=1024   # 部分场景可在 compose 中设置
#     deploy:
#       resources:
#         limits:
#           memory: 1200m
#     healthcheck:
#       test: ["CMD", "redis-cli", "-a", "YOUR_PASSWORD", "ping"]
#       interval: 10s
#       timeout: 3s
#       retries: 3
#       start_period: 10s
#     logging:
#       driver: "json-file"
#       options:
#         max-size: "100m"
#         max-file: "5"
