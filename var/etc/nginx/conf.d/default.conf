# 限流区（在 http 块中定义，这里仅作提示）
# limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# HTTP default server - 拦截未匹配请求
server {
    listen 80 default_server;
    listen [::]:80 default_server ipv6only=on;
    server_name _;

    # 关闭日志，避免扫描器刷爆磁盘
    # 如需保留攻击记录，改为：access_log /var/log/nginx/default-block.log main;
    access_log off;
    error_log  off;

    # 限制同 IP 并发连接，防止连接耗尽
    limit_conn conn_limit 5;

    return 444;
}

# HTTPS default server - 防止证书泄漏（Nginx 1.19.4+）
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server ipv6only=on;
    server_name _;

    # 直接拒绝 TLS 握手，不返回任何证书信息
    ssl_reject_handshake on;

    access_log off;
    error_log  off;
}