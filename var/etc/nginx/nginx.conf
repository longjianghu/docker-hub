# ==============================================================================
# Nginx 生产环境配置 - 优化版
# 适用场景：反向代理 + PHP-FPM + 静态文件服务
# 最后更新：2025
# ==============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# ------------------------------------------------------------------------------
# 事件模型
# ------------------------------------------------------------------------------
events {
    use epoll;
    worker_connections 10240;   # 建议 <= worker_rlimit_nofile / 2
    multi_accept on;
    accept_mutex off;           # epoll 下关闭，减少惊群延迟
}

# ==============================================================================
# HTTP 全局块
# ==============================================================================
http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --------------------------------------------------------------------------
    # 字符集
    # --------------------------------------------------------------------------
    charset utf-8;

    # --------------------------------------------------------------------------
    # 日志
    # --------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    # error_log 在顶层已定义，这里无需重复

    # --------------------------------------------------------------------------
    # 基础传输优化
    # --------------------------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    aio                threads;   # 异步 I/O，高并发静态文件场景有效
    directio           512;       # 大文件（>512KB）走 directio，避免 page cache 污染

    # --------------------------------------------------------------------------
    # 连接与超时
    # --------------------------------------------------------------------------
    keepalive_timeout        60 60;  # 第二个值发给客户端的 Keep-Alive header
    keepalive_requests       1000;   # 单连接最大请求数，防止长连接资源泄漏
    reset_timedout_connection on;    # 及时释放超时连接的内存

    client_header_timeout    15s;
    client_body_timeout      30s;
    send_timeout             30s;

    client_max_body_size     50m;    # 全局上限；可在具体 location 中覆盖缩小
    client_body_buffer_size  128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # --------------------------------------------------------------------------
    # 文件缓存（静态文件场景关键优化）
    # --------------------------------------------------------------------------
    open_file_cache          max=10000 inactive=30s;
    open_file_cache_valid    60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # --------------------------------------------------------------------------
    # 安全
    # --------------------------------------------------------------------------
    server_tokens off;  # 隐藏 Nginx 版本号

    # 安全响应头（在 server 块可按需覆盖）
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header X-XSS-Protection           "1; mode=block"                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
    # HSTS：全站 HTTPS 时启用，首次部署请确认无 HTTP 子域后再开启
    # add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;

    # --------------------------------------------------------------------------
    # 限流区域（需在 server/location 块引用才生效）
    # --------------------------------------------------------------------------
    limit_req_zone  $binary_remote_addr zone=req_limit:10m  rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_req_zone  $binary_remote_addr zone=api_limit:10m  rate=30r/s;  # API 接口专用

    # --------------------------------------------------------------------------
    # Gzip 压缩
    # --------------------------------------------------------------------------
    gzip               on;
    gzip_min_length    1k;
    gzip_buffers       4 16k;
    gzip_http_version  1.1;
    gzip_comp_level    4;        # CPU 与压缩率的平衡点
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2
        application/font-woff
        application/font-woff2
        application/vnd.ms-fontobject;
    gzip_vary          on;
    gzip_proxied       expired no-cache no-store private auth;
    gzip_disable       "MSIE [1-6]\.";  # 兼容老 IE，现代环境可删

    # --------------------------------------------------------------------------
    # 反向代理全局设置
    # --------------------------------------------------------------------------
    proxy_http_version      1.1;              # 启用 HTTP/1.1 以支持 keepalive
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        Connection        "";  # 配合 keepalive 必须置空

    proxy_connect_timeout   10s;   # 连接后端超时，10s 足够，过大掩盖问题
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;

    proxy_buffering         on;
    proxy_buffer_size       8k;    # 响应头缓冲，4k 有时不够（大 Cookie 场景）
    proxy_buffers           8 8k;  # 响应体缓冲
    proxy_busy_buffers_size 16k;   # 必须 >= proxy_buffer_size * 2
    proxy_temp_file_write_size 64k;

    proxy_next_upstream     error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;

    # --------------------------------------------------------------------------
    # FastCGI（PHP-FPM 场景）
    # --------------------------------------------------------------------------
    fastcgi_connect_timeout  60s;  # 300s 太长，会掩盖 PHP 性能问题
    fastcgi_send_timeout     60s;
    fastcgi_read_timeout     60s;
    fastcgi_buffer_size      64k;
    fastcgi_buffers          4 64k;
    fastcgi_busy_buffers_size 128k;
    fastcgi_temp_file_write_size 256k;
    fastcgi_intercept_errors on;   # 将 PHP 错误码交由 Nginx error_page 处理

    # --------------------------------------------------------------------------
    # 引入各站点配置
    # --------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}